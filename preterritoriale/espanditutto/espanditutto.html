  <script id="solution">

    function solve(T, P, N, M, R, C) {
        var ris = 0;

        // P = pixel bruciati
        // N = righe monitor
        // M = colonne monitor

        // R (array) = pixel bruciati in riga
        // C (array) = pixel bruciati in colonna

        //let maxr
        //let minr

        //let maxc
        //let minc

        //let mediar
        //let mediac

        //let tempc1
        //let tempr1
        //let tempc2
        //let tempr2

        //for (let i = 0; i < R.length; i++){
        //  if (R[i] <= minr) minr = R[i]
        //  if (R[i] > minr) minr = R[i]
        //}

        //for (let i = 0; i < C.length; i++){
        //  if (C[i] <= minr) minr = C[i]
        //  if (C[i] > minr) minr = C[i]
        //}

        //mediar = Math.floor((maxr + minr) / 2)
        //mediac = Math.floor((maxc + minc) / 2)

        //tempc1 = maxc - mediac
        //tempr1 = maxr - mediar
        //tempc2 = mediac - minc
        //tempr2 = mediar - minr
        
        // distanza massima di Manhattan è:
        // max(|(R1+C1) - (R2+C2)|, |(R1-C1) - (R2-C2)|)
        // serve per calcolare la distanza massima fra 2 punti

        // R1, C1 = riga, colonna pixel 1
        // R2, C2 = riga, colonna pixel 2

        let min
        let max
        let somma
        let dif

        let maxsomma = R[0] + C[0] // R1 + C1
        let minsomma = R[0] + C[0] // R2 + C2
        let maxdif = R[0] - C[0] // R1 - C1
        let mindif = R[0] - C[0] // R2 - C2

        if (N > 1 && M > 1){
          // prondo le variabili necessarie per la formula
          for (let i = 1; i < P; i++){
            somma = R[i] + C[i]
            dif = R[i] - C[i]
            
            // confronto per trovare minimo se il valore attuale è <
            if (somma > maxsomma) maxsomma = somma
            if (somma < minsomma) minsomma = somma
            if (dif > maxdif) maxdif = dif
            if (dif < mindif) mindif = dif
          }

          // formula
          ris = Math.max(Math.abs(maxsomma - minsomma), Math.abs(maxdif - mindif)) / 2 // diviso 2 dato che si parte dal centro

          // se lo spessore è di 1, (C colonne)
        } else if (N === 1){
          min = C[0]
          max = C[0]

          for (let i = 0; i < R.length; i++){
            min = Math.min(min, C[i])
            max = Math.max(max, C[i])
          }

          // centro
          ris = Math.floor((max - min) / 2) + 1

          // spessore di 1, (R righe)
        } else {
          min = R[0]
          max = R[0]

          for (let i = 0; i < R.length; i++){
            min = Math.min(min, R[i])
            max = Math.max(max, R[i])
          }

          // centro
          ris = Math.floor((max - min) / 2) + 1
        }

        return ris;
    }

  </script>

  <script id="template">

    function* main(input) {
        var T = input.nextInt();
        for (var test = 1; test <= T; ++test) {
            var P = input.nextInt();
            var N = input.nextInt();
            var M = input.nextInt();

            var R = Array(P);
            var C = Array(P);
            for (var i = 0; i < P; ++i) {
                R[i] = input.nextInt();
                C[i] = input.nextInt();
            }

            try {
                var ris = solve(T, P, N, M, R, C);
                yield `Case #${test}: `;
                yield `${ris}\r\n`;
            } catch (e) {
                yield `Case #${test} failed with error: ${e}\r\n`;
            }
        }
    }

  </script>
