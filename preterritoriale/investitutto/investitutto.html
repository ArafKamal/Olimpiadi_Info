      // giorno 3: 25 + 1 (26); 38 + 3 (41); 29 + 4 (33); 27 + 8 (35); scambio V3: 29 (29)
      // giorno 4: 26 + 1 (27); 41 + 3 (44); 33 + 4 (37); 35 + 8 (43); 29 + 2: 31 (31) ; scambio V4: 29 + 2 (31)

      // migliore: 41 + 3 (44)

      //         se conviene scambiare, salva il valore in max, dopo alla fine c'è sempre il confronto
      //         così da poter capire cosa converrebbe, simulando ogni singolo caso

      //    }

      //  ris = max




    // test con nuovo array che salva il migliore se al giorno [i] prendo titolo [i]:
    let arr = new Array(N)  // nuova rray dove si salveranno i valori senza scambi di ogni valore
    let temp  // valore temporaneo che simula il valore max a quella simulazione

    // valori se non faccio scambi
    for (let i = 0; i < N; i++){
      arr[i] = V[i] + G[i] * (N-i)
    }

    // al contrario pk arr[k] è già ottimale per k > j
    // controllo per ogni pos se conviene scambiare dal'ultimo
    for (let j = N-2; j >= 0; j--){

      // test tutti titoli (simile al codice precedente)
      for (let k = j+1; k < N; k++){
        temp = V[j] + G[j] * (k-j)  // valore del titolo j al giorno k

        if (temp >= V[k]){ // se abbastanza soldi, scambio
          // arrj = tengo titolo
          // arrk se lo cambio
          arr[j] = Math.max(arr[j], arr[k]) // salvo il migliore possibile
        }
      }
    }

    // risultato finale in pos 0 dopo tutti i confronti possibili (grz al doppio i(j,k))
    ris = arr[0]

    return ris;
  }

  <script id="template">

    function* main(input) {
        var T = input.nextInt();
        for (var test = 1; test <= T; ++test) {
            var N = input.nextInt();

            var V = Array(N);
            for (var i = 0; i < N; ++i)
                V[i] = input.nextInt();

            var G = Array(N);
            for (var i = 0; i < N; ++i)
                G[i] = input.nextInt();

            try {
                var ris = solve(T, N, V, G);
                yield `Case #${test}: `;
                yield `${ris}\r\n`;
            } catch (e) {
                yield `Case #${test} failed with error: ${e}\r\n`;
            }
        }
    }

  </script>
